<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AP CSP Flashcards</title>
<style>
:root {
  --teal: #0d9488; --teal-light: #f0fdfa; --teal-dark: #134e4a; --teal-mid: #99f6e4;
  --indigo: #4f46e5; --indigo-light: #eef2ff;
  --green: #059669; --green-light: #d1fae5;
  --red: #dc2626; --red-light: #fee2e2;
  --amber: #d97706; --amber-light: #fef3c7;
  --blue: #2563eb; --blue-light: #dbeafe;
  --purple: #7c3aed; --purple-light: #ede9fe;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-600: #4b5563; --gray-700: #374151; --gray-900: #111827;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── Fixed Header ── */
.app-header {
  background: linear-gradient(135deg, var(--teal-dark) 0%, var(--teal) 100%);
  padding: 12px 16px 10px;
  color: white;
  flex-shrink: 0;
}
.header-top { display: flex; align-items: baseline; justify-content: space-between; }
.app-header h1 { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.7; }
.overall-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.overall-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.25); border-radius: 3px; overflow: hidden; }
.overall-bar-fill { height: 100%; background: white; border-radius: 3px; transition: width 0.4s; }
.overall-label { font-size: 11px; opacity: 0.85; white-space: nowrap; }

/* ── Category Tabs ── */
.cat-scroll {
  display: flex; gap: 7px; overflow-x: auto; padding: 10px 14px 8px;
  background: white; border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0; scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid var(--gray-200); background: white;
  font-size: 12px; font-weight: 600; color: var(--gray-600); cursor: pointer;
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
  white-space: nowrap;
}
.cat-btn.active { border-color: transparent; color: white; }
.cat-count { font-size: 10px; opacity: 0.8; }
.cat-btn[data-cat="all"].active       { background: var(--teal); }
.cat-btn[data-cat="aap-syn"].active   { background: var(--blue); }
.cat-btn[data-cat="aap-trace"].active { background: var(--indigo); }
.cat-btn[data-cat="ioc"].active       { background: var(--red); }
.cat-btn[data-cat="dat"].active       { background: var(--amber); }
.cat-btn[data-cat="csn"].active       { background: var(--green); }
.cat-btn[data-cat="crd"].active       { background: var(--purple); }

/* ── Scrollable Question Area ── */
.question-area {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 8px;
  -webkit-overflow-scrolling: touch;
}
.deck-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.deck-bar-wrap { flex: 1; height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; }
.deck-bar-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; }
.deck-label { font-size: 11px; color: var(--gray-600); white-space: nowrap; }

.cat-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
  margin-bottom: 10px; display: block;
}
.cat-label.aap-syn   { color: var(--blue); }
.cat-label.aap-trace { color: var(--indigo); }
.cat-label.ioc       { color: var(--red); }
.cat-label.dat       { color: var(--amber); }
.cat-label.csn       { color: var(--green); }
.cat-label.crd       { color: var(--purple); }

.question-text {
  font-size: 17px; font-weight: 700; line-height: 1.45;
  color: var(--gray-900); margin-bottom: 10px;
}
.question-code {
  font-family: 'Courier New', monospace; font-size: 13px;
  background: var(--gray-900); color: #86efac;
  padding: 12px 14px; border-radius: 10px;
  white-space: pre; line-height: 1.75;
  overflow-x: auto; margin-bottom: 10px;
  display: block;
}
.explanation-box {
  background: var(--teal-light); border-left: 3px solid var(--teal);
  border-radius: 6px; padding: 10px 12px;
  font-size: 13px; color: var(--gray-700); line-height: 1.55;
  margin-top: 10px;
}
.explanation-box .exp-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--teal); margin-bottom: 5px;
}

/* ── Fixed Bottom Choice Area ── */
.choice-area {
  flex-shrink: 0;
  background: white;
  border-top: 1px solid var(--gray-200);
  padding: 10px 14px 20px;
}
.choice-btn {
  display: flex; align-items: flex-start; gap: 10px;
  width: 100%; padding: 10px 12px; margin-bottom: 7px;
  border: 1.5px solid var(--gray-200); border-radius: 10px;
  background: white; cursor: pointer; text-align: left;
  font-size: 13px; color: var(--gray-700); line-height: 1.4;
  transition: border-color 0.15s, background 0.15s;
}
.choice-btn:last-child { margin-bottom: 0; }
.choice-btn:active { background: var(--gray-50); }
.choice-letter {
  font-size: 12px; font-weight: 800; color: var(--gray-400);
  flex-shrink: 0; width: 18px; padding-top: 1px;
}
.choice-btn.correct {
  border-color: var(--green); background: var(--green-light);
}
.choice-btn.correct .choice-letter { color: var(--green); }
.choice-btn.wrong {
  border-color: var(--red); background: var(--red-light);
}
.choice-btn.wrong .choice-letter { color: var(--red); }
.choice-btn.disabled { cursor: default; opacity: 0.6; }
.choice-btn.disabled:active { background: white; }

.next-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-next { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-mastered { background: var(--green-light); color: var(--green); }
.btn-review   { background: var(--amber-light); color: var(--amber); }

/* ── State screens ── */
.state-screen {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.state-card {
  background: white; border-radius: 16px; padding: 32px 24px;
  text-align: center; max-width: 340px; width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.state-icon { font-size: 48px; margin-bottom: 14px; }
.state-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.state-card p  { font-size: 14px; color: var(--gray-600); line-height: 1.5; margin-bottom: 16px; }
.state-btn {
  display: block; width: 100%; background: var(--teal); color: white;
  border: none; border-radius: 10px; padding: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px;
}
.state-btn.secondary { background: var(--indigo); }

/* ── Shuffle row ── */
.bottom-bar {
  flex-shrink: 0; background: white; border-top: 1px solid var(--gray-100);
  padding: 8px 16px 16px; display: flex; gap: 8px;
}
.bar-btn {
  flex: 1; background: var(--gray-100); border: none; border-radius: 8px;
  padding: 8px; font-size: 12px; font-weight: 600; color: var(--gray-700); cursor: pointer;
}
.bar-btn:active { background: var(--gray-200); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <h1>AP CSP Flashcards</h1>
    <span class="header-sub">Exam: May 14, 2026</span>
  </div>
  <div class="overall-row">
    <div class="overall-bar-wrap"><div class="overall-bar-fill" id="overall-fill" style="width:0%"></div></div>
    <span class="overall-label" id="overall-label">0 / 108 mastered</span>
  </div>
</header>

<div class="cat-scroll" id="cat-scroll">
  <button class="cat-btn active" data-cat="all"       onclick="selectCat('all')">All <span class="cat-count" id="cnt-all"></span></button>
  <button class="cat-btn" data-cat="aap-syn"          onclick="selectCat('aap-syn')">AAP: Syntax <span class="cat-count" id="cnt-aap-syn"></span></button>
  <button class="cat-btn" data-cat="aap-trace"        onclick="selectCat('aap-trace')">AAP: Tracing <span class="cat-count" id="cnt-aap-trace"></span></button>
  <button class="cat-btn" data-cat="ioc"              onclick="selectCat('ioc')">IOC <span class="cat-count" id="cnt-ioc"></span></button>
  <button class="cat-btn" data-cat="dat"              onclick="selectCat('dat')">DAT <span class="cat-count" id="cnt-dat"></span></button>
  <button class="cat-btn" data-cat="csn"              onclick="selectCat('csn')">CSN <span class="cat-count" id="cnt-csn"></span></button>
  <button class="cat-btn" data-cat="crd"              onclick="selectCat('crd')">CRD <span class="cat-count" id="cnt-crd"></span></button>
</div>

<div id="main-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
  <!-- rendered by JS -->
</div>

<script>
// ─────────────────────────────────────────────
// CARD DATA
// Sources:
//   CB AP CSP Course and Exam Description (CED), College Board
//   Official CB pseudocode reference (CED Appendix)
//   CB Learning Objectives: AAP-1..4, IOC-1..2, DAT-1..2, CSN-1..2, CRD-1..2
// choices[0] is always the correct answer. Array is shuffled at render time.
// exp = explanation shown after answering.
// code = true renders q in a monospace code block.
// ─────────────────────────────────────────────
const CARDS = [

// ══ AAP: PSEUDOCODE SYNTAX ══
{id:'syn-01',cat:'aap-syn',
 q:'What symbol is used for assignment in CB pseudocode?',
 choices:['← (left arrow), e.g. x ← 5','= (equals sign), e.g. x = 5','→ (right arrow), e.g. x → 5',':= (colon-equals), e.g. x := 5'],
 exp:'CB pseudocode uses ← for assignment — not = like Python/JavaScript. This is a common source of confusion on the exam.'},

{id:'syn-02',cat:'aap-syn',
 q:'What index refers to the FIRST item of a list in CB pseudocode?',
 choices:['1 — list indices start at 1','0 — list indices start at 0','-1 — the first item uses a negative index','It depends on how the list was created'],
 exp:'CB pseudocode is 1-indexed. If nums ← [10,20,30], then nums[1] = 10 and nums[3] = 30. This is the #1 exam trap for anyone who codes in Python or JavaScript.'},

{id:'syn-03',cat:'aap-syn',
 q:'When does REPEAT UNTIL (condition) stop executing?',
 choices:['When the condition becomes TRUE','When the condition becomes FALSE','After running the body exactly once if condition starts true','After a fixed number of iterations'],
 exp:'REPEAT UNTIL stops when condition is TRUE. It checks after each iteration, so the body always runs at least once even if condition is initially true.'},

{id:'syn-04',cat:'aap-syn',
 q:'What does APPEND(list, value) do?',
 choices:['Adds value to the END of the list','Adds value to the BEGINNING of the list','Replaces the LAST item with value','Inserts value at the middle of the list'],
 exp:'APPEND adds to the end, increasing list length by 1. Example: APPEND([1,2],3) → [1,2,3].'},

{id:'syn-05',cat:'aap-syn',
 q:'What does INSERT([1,2,3], 2, 99) produce?',
 choices:['[1, 99, 2, 3] — inserts 99 at position 2, shifting others right','[1, 2, 99, 3] — replaces position 2 with 99','[1, 2, 3, 99] — appends 99 after position 2','[99, 1, 2, 3] — inserts 99 before everything'],
 exp:'INSERT(list, i, val) inserts val at position i and shifts existing items at i and beyond one spot to the right.'},

{id:'syn-06',cat:'aap-syn',
 q:'What does REMOVE([10,20,30], 2) produce?',
 choices:['[10, 30] — removes the item at index 2 (value 20)','[10, 20] — removes the last item','[20, 30] — removes the item at index 1','[10, 0, 30] — replaces index 2 with a blank'],
 exp:'REMOVE(list, i) removes the item at position i and shifts later items left. List becomes one shorter.'},

{id:'syn-07',cat:'aap-syn',
 q:'What does LENGTH([5, 10, 15, 20]) return?',
 choices:['4 — the number of items in the list','3 — the index of the last item','20 — the value of the last item','50 — the sum of all items'],
 exp:'LENGTH returns the count of items. The last item is always at index LENGTH(list), NOT LENGTH(list)-1 (that would be 0-based thinking).'},

{id:'syn-08',cat:'aap-syn',
 q:'In FOR EACH item IN list { }, which elements are visited?',
 choices:['Every element in order from index 1 to LENGTH(list)','Only elements at odd-numbered indices','Elements in reverse order, last to first','Only elements satisfying a built-in condition'],
 exp:'FOR EACH visits every element once, in order. After the loop, item holds the value of the last element.'},

{id:'syn-09',cat:'aap-syn',
 q:'What is the result of: TRUE AND FALSE OR TRUE?',
 choices:['TRUE — AND binds first: (T AND F)=F, then F OR T=T','FALSE — AND and OR cancel each other','TRUE — OR always overrides AND regardless','FALSE — because the middle value is FALSE'],
 exp:'AND has higher precedence than OR in CB pseudocode, so this is evaluated as (TRUE AND FALSE) OR TRUE = FALSE OR TRUE = TRUE.'},

{id:'syn-10',cat:'aap-syn',
 q:'What does 17 MOD 5 return?',
 choices:['2 — the remainder when 17 is divided by 5','3 — the integer quotient of 17 ÷ 5','3.4 — the decimal result of 17 ÷ 5','0 — because 17 is not evenly divisible by 5'],
 exp:'MOD returns the remainder. 17 = 3×5 + 2, so 17 MOD 5 = 2. Useful for checking even/odd: n MOD 2 = 0 means even.'},

{id:'syn-11',cat:'aap-syn',
 q:'How do you define a procedure named "add" with parameters x and y?',
 choices:['PROCEDURE add(x, y) { RETURN x + y }','FUNCTION add(x, y) { RETURN x + y }','DEF add(x, y): return x + y','add(x, y) → { RETURN x + y }'],
 exp:'CB pseudocode uses PROCEDURE, not FUNCTION or DEF. Parameters are listed in parentheses. RETURN is optional if no value is sent back.'},

{id:'syn-12',cat:'aap-syn',
 q:'Which loop runs an unknown number of times determined by a condition?',
 choices:['REPEAT UNTIL (condition) — runs until condition is true','REPEAT n TIMES — n can be a variable computed at runtime','FOR EACH item IN list — length is not always known','Both loop types can run an unknown number of times'],
 exp:'REPEAT n TIMES always runs exactly n times. REPEAT UNTIL runs until the condition becomes TRUE — the count is determined by program state, not set in advance.'},

{id:'syn-13',cat:'aap-syn',
 q:'What values can RANDOM(1, 4) return?',
 choices:['1, 2, 3, or 4 — both endpoints are included','1, 2, or 3 — the upper endpoint is excluded','2 or 3 — both endpoints are excluded','Any decimal between 1.0 and 4.0'],
 exp:'RANDOM(a, b) returns a random integer from a to b, inclusive. RANDOM(1, 6) can return 1, 2, 3, 4, 5, or 6 — simulating a die roll.'},

{id:'syn-14',cat:'aap-syn',
 q:'In PROCEDURE double(n) called as double(5): which is the parameter, which is the argument?',
 choices:['n is the parameter (placeholder); 5 is the argument (value passed in)','5 is the parameter; n is the argument','Both n and 5 are parameters','n is the argument; 5 is the variable'],
 exp:'Parameter = variable name in the procedure definition (a placeholder). Argument = the actual value supplied when calling the procedure.'},

{id:'syn-15',cat:'aap-syn',
 q:'For a list with 6 items, how do you access the LAST item?',
 choices:['list[LENGTH(list)] which equals list[6]','list[LENGTH(list)-1] which equals list[5]','list[LENGTH(list)+1] — one past the end','LAST(list) — a built-in function'],
 exp:'Because CB lists are 1-indexed, the last item is at index LENGTH(list), not LENGTH-1. That\'s the 0-based mistake.'},

{id:'syn-16',cat:'aap-syn',
 q:'After a procedure finishes, what happens to variables defined inside it?',
 choices:['They cease to exist — local variables only live during execution','They keep their last value and can be read from outside','They reset to 0 but remain accessible','They permanently overwrite any global variable with the same name'],
 exp:'Variables defined inside a procedure are local — they are created when the procedure starts and destroyed when it returns. Parameters are also local.'},

{id:'syn-17',cat:'aap-syn',
 q:'What does a procedure WITHOUT a RETURN statement return?',
 choices:['Nothing — it cannot be used in an expression or assigned to a variable','0 — the default return value','The last value computed inside the procedure','TRUE — all void procedures return true by default'],
 exp:'Procedures without RETURN are called for side effects only (e.g., displaying output). You cannot write x ← myProc() if myProc has no RETURN.'},

{id:'syn-18',cat:'aap-syn',
 q:'What is equivalent to NOT (x > 10)?',
 choices:['x ≤ 10','x < 10','x ≥ 10','x = 10'],
 exp:'NOT flips the comparison: NOT(x > 10) means x is NOT greater than 10, which is x ≤ 10. Common trap: it is NOT x < 10.'},

{id:'syn-19',cat:'aap-syn',
 q:'What happens if the REPEAT UNTIL condition is NEVER true?',
 choices:['The loop runs forever — an infinite loop (logic error)','The program stops automatically after 1,000 iterations','CB pseudocode raises a runtime error and exits','The loop runs once then stops regardless'],
 exp:'An always-false REPEAT UNTIL condition creates an infinite loop. The programmer must ensure something inside the loop will eventually make the condition true.'},

{id:'syn-20',cat:'aap-syn',
 q:'How is "a AND b OR c" interpreted in CB pseudocode?',
 choices:['(a AND b) OR c — AND has higher precedence than OR','a AND (b OR c) — OR has higher precedence than AND','Left to right: evaluated as ((a AND b) OR c) = (a AND (b OR c)) always','Precedence only applies when NOT is also present'],
 exp:'AND binds tighter than OR in CB pseudocode. Use parentheses on the exam to avoid ambiguity; CB questions are usually explicit about grouping.'},

// ══ AAP: CODE TRACING ══
{id:'trace-01',cat:'aap-trace',code:true,
 q:'x ← 3\ny ← x * 2 + 1\nDISPLAY(y)',
 choices:['7','6','8','9'],
 exp:'x = 3, so y = 3×2+1 = 7. DISPLAY shows 7.'},

{id:'trace-02',cat:'aap-trace',code:true,
 q:'nums ← [4, 8, 15, 16]\nDISPLAY(nums[2])',
 choices:['8','15 (0-based index 2)','4 (first item)','16 (last item)'],
 exp:'CB lists are 1-indexed. nums[1]=4, nums[2]=8, nums[3]=15, nums[4]=16. The answer is 8, not 15.'},

{id:'trace-03',cat:'aap-trace',code:true,
 q:'total ← 0\nREPEAT 4 TIMES\n{\n   total ← total + 3\n}\nDISPLAY(total)',
 choices:['12','9','15','3'],
 exp:'Each iteration adds 3: after 1→3, 2→6, 3→9, 4→12. DISPLAY shows 12.'},

{id:'trace-04',cat:'aap-trace',code:true,
 q:'nums ← [2, 5, 3, 8, 1]\ntotal ← 0\nFOR EACH n IN nums\n{\n   total ← total + n\n}\nDISPLAY(total)',
 choices:['19','5 (length of list)','8 (largest element)','23'],
 exp:'2+5+3+8+1 = 19. FOR EACH visits every element once in order.'},

{id:'trace-05',cat:'aap-trace',code:true,
 q:'x ← 10\nIF (x MOD 2 = 0)\n{\n   DISPLAY("even")\n}\nELSE\n{\n   DISPLAY("odd")\n}',
 choices:['"even"','"odd"','0','1'],
 exp:'10 MOD 2 = 0, so condition is TRUE → "even" is displayed.'},

{id:'trace-06',cat:'aap-trace',code:true,
 q:'nums ← [1, 2, 3]\nAPPEND(nums, 4)\nREMOVE(nums, 1)\n-- What is nums?',
 choices:['[2, 3, 4]','[1, 2, 3, 4] (forgot REMOVE)','[1, 3, 4] (wrong index removed)','[2, 3, 4, 1]'],
 exp:'APPEND → [1,2,3,4]. REMOVE(nums,1) removes index 1 (value 1) → [2,3,4].'},

{id:'trace-07',cat:'aap-trace',code:true,
 q:'count ← 1\nREPEAT UNTIL (count > 4)\n{\n   count ← count + 1\n}\nDISPLAY(count)',
 choices:['5','4','6','1'],
 exp:'count goes 1→2→3→4→5. When count=5, (5>4) is TRUE so loop stops. DISPLAY shows 5.'},

{id:'trace-08',cat:'aap-trace',code:true,
 q:'PROCEDURE mystery(a, b)\n{\n   RETURN a * a + b\n}\nDISPLAY(mystery(3, 4))',
 choices:['13','7 (a+b)','12 (a×b)','16 (b×b)'],
 exp:'a=3, b=4. result = 3×3+4 = 9+4 = 13.'},

{id:'trace-09',cat:'aap-trace',code:true,
 q:'x ← 5\nIF (x > 3 AND x < 10)\n{\n   DISPLAY("A")\n}\nELSE\n{\n   DISPLAY("B")\n}',
 choices:['"A"','"B"','Nothing is displayed','Error — cannot compare x twice'],
 exp:'(5>3) is TRUE and (5<10) is TRUE. TRUE AND TRUE = TRUE → "A" is displayed.'},

{id:'trace-10',cat:'aap-trace',code:true,
 q:'nums ← [10, 20, 30]\nINSERT(nums, 2, 99)\nDISPLAY(nums[3])',
 choices:['20','99 (the inserted value)','30 (original index 3)','10'],
 exp:'After INSERT(nums,2,99): [10,99,20,30]. nums[3] is now 20 — it was shifted right.'},

{id:'trace-11',cat:'aap-trace',code:true,
 q:'PROCEDURE double(n)\n{\n   RETURN n * 2\n}\nresult ← double(double(3))\nDISPLAY(result)',
 choices:['12','6','9','18'],
 exp:'Inner call: double(3)=6. Outer call: double(6)=12. DISPLAY shows 12.'},

{id:'trace-12',cat:'aap-trace',code:true,
 q:'nums ← [4, 9, 2, 7, 1]\nmax ← nums[1]\nFOR EACH n IN nums\n{\n   IF (n > max) { max ← n }\n}\n-- What is max?',
 choices:['9','4 (starting value)','7 (second largest)','1 (last element)'],
 exp:'Find-maximum algorithm. max starts at 4, updates to 9 when 9 is visited. Final max = 9.'},

{id:'trace-13',cat:'aap-trace',code:true,
 q:'nums ← [8, 3, 7, 1, 5]\nmin ← nums[1]\nFOR EACH n IN nums\n{\n   IF (n < min) { min ← n }\n}\nDISPLAY(min)',
 choices:['1','8 (starting value)','3 (second smallest)','5 (last element)'],
 exp:'Find-minimum algorithm. min starts at 8, updates to 3, then 1. Final min = 1.'},

{id:'trace-14',cat:'aap-trace',code:true,
 q:'nums ← [1, 4, 2, 4, 3, 4]\ncount ← 0\nFOR EACH n IN nums\n{\n   IF (n = 4) { count ← count + 1 }\n}\nDISPLAY(count)',
 choices:['3','2','4 (the target value)','6 (total elements)'],
 exp:'4 appears at positions 2, 4, and 6 → count = 3.'},

{id:'trace-15',cat:'aap-trace',code:true,
 q:'x ← 1\ny ← 2\ntemp ← x\nx ← y\ny ← temp\nDISPLAY(x)\nDISPLAY(y)',
 choices:['2 then 1','1 then 2 (no swap)','1 then 1','2 then 2'],
 exp:'Classic swap via temp variable. temp=1, x=2, y=1. DISPLAY(x)→2, DISPLAY(y)→1.'},

{id:'trace-16',cat:'aap-trace',code:true,
 q:'i ← 1\nresult ← 0\nREPEAT UNTIL (i > 5)\n{\n   result ← result + i\n   i ← i + 1\n}\nDISPLAY(result)',
 choices:['15','10 (1+2+3+4)','21 (1 through 6)','6 (i\'s final value)'],
 exp:'Sums 1+2+3+4+5 = 15. Loop stops when i=6 (6>5 is TRUE).'},

{id:'trace-17',cat:'aap-trace',code:true,
 q:'nums ← [2, 4, 6, 8]\ntotal ← 0\nFOR EACH n IN nums\n{\n   IF (n MOD 4 = 0) { total ← total + n }\n}\nDISPLAY(total)',
 choices:['12','20 (sum of all)','4 (first match only)','8 (last match only)'],
 exp:'2 MOD 4=2 (skip), 4 MOD 4=0 (add), 6 MOD 4=2 (skip), 8 MOD 4=0 (add). total = 4+8 = 12.'},

{id:'trace-18',cat:'aap-trace',code:true,
 q:'nums ← [5, 10, 15]\nAPPEND(nums, 20)\nINSERT(nums, 1, 0)\nREMOVE(nums, 3)\n-- What is nums?',
 choices:['[0, 5, 15, 20]','[0, 5, 10, 20] (wrong remove)','[0, 5, 10, 15, 20] (forgot remove)','[5, 10, 15, 20] (forgot insert)'],
 exp:'APPEND→[5,10,15,20]. INSERT(1,0)→[0,5,10,15,20]. REMOVE(3) removes index 3 (value 10)→[0,5,15,20].'},

{id:'trace-19',cat:'aap-trace',code:true,
 q:'PROCEDURE isEven(n)\n{\n   IF (n MOD 2 = 0) { RETURN true }\n   ELSE { RETURN false }\n}\nDISPLAY(isEven(7))',
 choices:['false','true','1','0'],
 exp:'7 MOD 2 = 1, not 0, so condition is FALSE → ELSE branch returns false.'},

{id:'trace-20',cat:'aap-trace',code:true,
 q:'x ← 10\nIF (x > 5 AND x < 8) { DISPLAY("A") }\nELSE IF (x > 8 AND x < 12) { DISPLAY("B") }\nELSE { DISPLAY("C") }',
 choices:['"B"','"A"','"C"','Nothing — both conditions are false'],
 exp:'First: (10>5) AND (10<8) = T AND F = FALSE. Second: (10>8) AND (10<12) = T AND T = TRUE → "B".'},

{id:'trace-21',cat:'aap-trace',code:true,
 q:'PROCEDURE sumList(lst)\n{\n   total ← 0\n   FOR EACH item IN lst { total ← total + item }\n   RETURN total\n}\nDISPLAY(sumList([3, 3, 3]))',
 choices:['9','3','6','12'],
 exp:'3+3+3 = 9. RETURN 9. DISPLAY shows 9.'},

{id:'trace-22',cat:'aap-trace',code:true,
 q:'count ← 0\nnum ← 32\nREPEAT UNTIL (num = 1)\n{\n   num ← num / 2\n   count ← count + 1\n}\nDISPLAY(count)',
 choices:['5','6','4','32'],
 exp:'32→16→8→4→2→1 (5 halvings). count = 5.'},

// ══ IOC: IMPACT OF COMPUTING ══
{id:'ioc-01',cat:'ioc',
 q:'What is PII?',
 choices:['Data that can identify a specific individual (name, SSN, IP address, biometrics)','Any data stored digitally, regardless of sensitivity','Only government-issued ID numbers like SSN or passport','Data encrypted by a third party to protect identity'],
 exp:'PII = Personally Identifiable Information. Any data that can single out or locate an individual counts — including IP addresses, location history, and combinations of seemingly harmless fields.'},

{id:'ioc-02',cat:'ioc',
 q:'Is an IP address considered PII?',
 choices:['Yes — it can identify or locate a specific device or individual','No — IP addresses are public and cannot identify individuals','Only if combined with a physical name and address','Only static IP addresses, not dynamic ones'],
 exp:'Yes. An IP address can identify or geolocate a device, making it PII. CB exam questions test edge cases like this.'},

{id:'ioc-03',cat:'ioc',
 q:'What is the digital divide?',
 choices:['Unequal access to technology due to income, geography, age, or disability','The gap between analog and digital technology','Speed difference between wired and wireless connections','The difference between the number of computers and number of users'],
 exp:'The digital divide describes how access to computing and the internet is not equal across populations — driven by economic, geographic, and social factors.'},

{id:'ioc-04',cat:'ioc',
 q:'What is phishing?',
 choices:['Deceiving users into revealing sensitive info by impersonating a trusted entity','Software that intercepts network traffic to capture passwords','Malware that encrypts files and demands ransom','Flooding a server with requests to make it unavailable'],
 exp:'Phishing uses social engineering — fake emails, websites, or messages — to trick users. It does not require exploiting software vulnerabilities.'},

{id:'ioc-05',cat:'ioc',
 q:'What is the key difference between symmetric and asymmetric encryption?',
 choices:['Symmetric: one shared key for both sides; asymmetric: public key encrypts, private key decrypts','Symmetric is slower and less secure; asymmetric uses a single shared key','Both use the same key — only key length differs','Asymmetric is for local files; symmetric is for internet traffic'],
 exp:'HTTPS uses asymmetric encryption to exchange keys, then symmetric for the session. Asymmetric is slower but solves the key-sharing problem.'},

{id:'ioc-06',cat:'ioc',
 q:'What is algorithmic bias?',
 choices:['Unfair results from an algorithm trained on historically biased data','Intentional discrimination programmed by a malicious developer','Random errors introduced by hardware imperfections','Slower performance when processing data from certain groups'],
 exp:'Bias enters through training data that reflects historical inequities. The algorithm learns and then amplifies those patterns at scale — often unintentionally.'},

{id:'ioc-07',cat:'ioc',
 q:'How does a Creative Commons license differ from standard copyright?',
 choices:['Copyright restricts use by default; CC grants usage rights in advance under specified conditions','Creative Commons is more restrictive than standard copyright','Both require explicit written permission before any use','CC applies only to government-produced works'],
 exp:'CC licenses let creators specify in advance how their work can be used (attribution required, no commercial use, etc.). Standard copyright restricts all use unless permission is granted.'},

{id:'ioc-08',cat:'ioc',
 q:'What is multifactor authentication (MFA)?',
 choices:['Verification requiring 2+ factors: something you know, have, or are','A very long password (12+ characters) with special characters','Using two different passwords for the same account','Changing your password every 30 days automatically'],
 exp:'MFA combines: something you know (password), something you have (phone/token), something you are (biometrics). Compromising one factor is not enough.'},

{id:'ioc-09',cat:'ioc',
 q:'What is the correct relationship among malware, virus, and ransomware?',
 choices:['Malware = broad term; virus = self-replicating; ransomware = encrypts files for ransom','Ransomware is another name for a virus; malware only refers to spyware','Viruses encrypt files; ransomware spreads via email attachments','All three are interchangeable terms for the same threat'],
 exp:'Malware is the umbrella term for all malicious software. Viruses and ransomware are specific types of malware.'},

{id:'ioc-10',cat:'ioc',
 q:'According to CB, does a computing innovation have to be a software program?',
 choices:['No — it can be any device, app, or system where a program is an integral component','Yes — only software applications count as computing innovations','Yes — only innovations distributed through a recognized app store','No — but it must replace a previously manual task'],
 exp:'CB\'s definition is intentionally broad. A smart thermostat, GPS device, or medical imaging system all qualify as computing innovations.'},

{id:'ioc-11',cat:'ioc',
 q:'What is the key difference between open-source and proprietary software?',
 choices:['Open-source: public code, freely modifiable; proprietary: private code, restricted use','Open-source is always free to use commercially without restriction','Proprietary software has viewable but non-modifiable code','Open-source requires a paid license; proprietary is always free'],
 exp:'Open-source enables transparency, collaboration, and community improvement. Proprietary protects trade secrets. Many open-source licenses (GPL, MIT) still impose some conditions.'},

{id:'ioc-12',cat:'ioc',
 q:'Can the same computing innovation have both beneficial AND harmful effects?',
 choices:['Yes — nearly every innovation has both intended benefits and unintended harms','No — CB treats benefits and harms as mutually exclusive','Only innovations from private companies can have harmful effects','Harms only occur when an innovation is used illegally'],
 exp:'This is a core CB concept. Exam questions often ask you to identify one benefit AND one potential harm of the same technology.'},

{id:'ioc-13',cat:'ioc',
 q:'What is crowdsourcing?',
 choices:['Obtaining input, data, or work from a large public group via the internet','Hiring freelance programmers to build software faster','Distributing processing across many computers simultaneously','Collecting user data without their explicit consent'],
 exp:'Examples: Wikipedia, reCAPTCHA, Waze traffic reports, open-source software. CB frames it as computing enabling scale that no small team could achieve.'},

{id:'ioc-14',cat:'ioc',
 q:'What is the Internet of Things (IoT)?',
 choices:['Physical devices beyond computers connected to the internet to collect and share data','The physical cables and servers that form the internet backbone','A network of websites that automatically share data with each other','Software that simulates physical device behavior online'],
 exp:'IoT includes smart thermostats, fitness trackers, connected appliances, and city infrastructure. It generates massive data and raises new privacy/security concerns.'},

{id:'ioc-15',cat:'ioc',
 q:'What are browser cookies, and are they always harmful?',
 choices:['Small data files websites store to remember info between visits — useful but can enable tracking','Malicious programs installed automatically when visiting websites','Encrypted records of a user\'s passwords stored by the browser','Temporary files that auto-delete when the browser closes'],
 exp:'Cookies are not inherently harmful. First-party cookies are useful (staying logged in). Third-party tracking cookies raise privacy concerns by following users across sites.'},

{id:'ioc-16',cat:'ioc',
 q:'What is data mining?',
 choices:['Analyzing large datasets to discover patterns not explicitly known in advance','Illegally copying data from another company\'s servers','Manually reviewing spreadsheets to find calculation errors','Compressing data to reduce storage before archiving'],
 exp:'Data mining can reveal sensitive inferences about individuals even from data that seems anonymous — a key privacy concern CB tests.'},

{id:'ioc-17',cat:'ioc',
 q:'What is a DDoS attack?',
 choices:['Many compromised machines simultaneously flood a target, making it unavailable','One machine repeatedly guesses passwords until one works','Malware that encrypts files across a distributed network','A virus that spreads machine-to-machine via email attachments'],
 exp:'DDoS = Distributed Denial of Service. A botnet of infected computers sends traffic from thousands of IPs simultaneously, making it hard to block.'},

{id:'ioc-18',cat:'ioc',
 q:'What is a keylogger?',
 choices:['Malware that secretly records every keystroke to steal passwords and sensitive data','Software that monitors websites visited and reports to an employer','Hardware that measures typing speed for ergonomic purposes','A phishing tool that creates fake login screens'],
 exp:'Keyloggers capture input before it\'s encrypted — so even secure HTTPS connections don\'t protect against them if the device is already compromised.'},

{id:'ioc-19',cat:'ioc',
 q:'What is citizen science, and how does computing enable it?',
 choices:['Volunteers collect or analyze scientific data at scale — computing enables millions of contributors','Research conducted only by government-funded institutions','Science education programs using computing in K-12 schools','Studies using computer simulations instead of real experiments'],
 exp:'Examples: Galaxy Zoo (galaxy classification), Foldit (protein folding), bird migration tracking. Computing enables scale no small research team could achieve.'},

{id:'ioc-20',cat:'ioc',
 q:'What is net neutrality?',
 choices:['ISPs must treat all internet traffic equally — no prioritizing, throttling, or blocking','A law requiring all websites to load at the same speed','The standard ensuring packets arrive in the correct order','Policy requiring free internet service for low-income households'],
 exp:'Without net neutrality, an ISP could slow competitors\' streaming services or charge more for certain content. CB frames this as a policy debate around access and equity.'},

{id:'ioc-21',cat:'ioc',
 q:'Which best describes how computing has benefited medicine and science?',
 choices:['Genome sequencing, medical imaging analysis, drug simulation, and disease modeling','Replacing all lab experiments with computer-generated results','Using computers only for administrative scheduling and billing','Robots that perform surgery without any human involvement'],
 exp:'Computing has dramatically accelerated scientific research — from processing telescope data to modeling protein folding — enabling discoveries impossible without computing power.'},

{id:'ioc-22',cat:'ioc',
 q:'What is a rogue access point (evil twin) attack?',
 choices:['A fake Wi-Fi hotspot that intercepts traffic from users who connect to it','A legitimate router misconfigured with an incorrect password','A wireless access point operating outside its licensed frequency range','A government surveillance network disguised as public Wi-Fi'],
 exp:'Defense: always use HTTPS, verify network names carefully, avoid public Wi-Fi for sensitive tasks, use a VPN on public networks.'},

// ══ DAT: DATA ══
{id:'dat-01',cat:'dat',
 q:'How many different values can n bits represent?',
 choices:['2^n — each additional bit doubles the count','n×2 — scales linearly with bits','n^2 — squaring the bit count','2×n+1 — accounting for zero'],
 exp:'1 bit→2 values, 2 bits→4, 8 bits→256, 16 bits→65,536. Adding 1 bit always doubles capacity.'},

{id:'dat-02',cat:'dat',
 q:'What is 13 in binary?',
 choices:['1101','1011','1110','1001'],
 exp:'13 = 8+4+1 = 1101. Check: 1×8 + 1×4 + 0×2 + 1×1 = 13 ✓'},

{id:'dat-03',cat:'dat',
 q:'What is overflow in data representation?',
 choices:['A number exceeds available bits, causing an incorrect wrap-around value','A program uses more memory than the computer has available','A network sends more data than its bandwidth allows','A list has more items than the programmer expected'],
 exp:'Example: if 8 bits hold 0–255, then 255+1 overflows to 0. Overflow produces silently wrong results — a common source of software bugs.'},

{id:'dat-04',cat:'dat',
 q:'What is the key difference between lossless and lossy compression?',
 choices:['Lossless preserves all data (ZIP, PNG); lossy permanently discards some (JPEG, MP3)','Lossless is for images only; lossy is for text files','Both lose some data — lossless just loses less','Lossy is reversible with the right decompression key'],
 exp:'Lossless: exact original can be reconstructed. Lossy: some data is gone forever. Use lossless for text/code; lossy is acceptable for media where small quality loss is unnoticeable.'},

{id:'dat-05',cat:'dat',
 q:'What is metadata? Give an example.',
 choices:['Data about data — e.g. a photo\'s GPS location, creation time, and file size','The actual content of a file (pixels in an image, text in a document)','Encrypted data protecting file contents from unauthorized access','Error logs generated by a program for debugging purposes'],
 exp:'Metadata can reveal sensitive information even when content is private. A photo\'s metadata can expose location, device, and time — without viewing the photo itself.'},

{id:'dat-06',cat:'dat',
 q:'What is 10 in binary?',
 choices:['1010','1100','0110','1001'],
 exp:'10 = 8+2 = 1010. Check: 1×8+0×4+1×2+0×1 = 10 ✓'},

{id:'dat-07',cat:'dat',
 q:'What is the difference between correlation and causation?',
 choices:['Correlation: variables change together; causation: one directly causes the other','Correlation always implies causation with a large enough sample size','Causation means two variables appear in the same dataset','They are the same concept, measured differently'],
 exp:'Classic example: ice cream sales and drowning both rise in summer (correlated) but ice cream doesn\'t cause drowning — hot weather causes both. CB questions test this directly.'},

{id:'dat-08',cat:'dat',
 q:'What is data cleaning and why does it matter?',
 choices:['Fixing errors, duplicates, and missing values in a dataset before analysis — "garbage in, garbage out"','Reducing file size by removing whitespace before storage','Encrypting sensitive fields to meet privacy regulations','Visualizing data to identify trends before storing it'],
 exp:'Dirty data produces unreliable analysis results. Data cleaning is a prerequisite for meaningful insights from any dataset.'},

{id:'dat-09',cat:'dat',
 q:'What is binary 1010 in decimal?',
 choices:['10','5 (1+0+1+0)','12','6'],
 exp:'1×8 + 0×4 + 1×2 + 0×1 = 8+2 = 10.'},

{id:'dat-10',cat:'dat',
 q:'What is binary 11001 in decimal?',
 choices:['25','19','9','28'],
 exp:'1×16 + 1×8 + 0×4 + 0×2 + 1×1 = 16+8+1 = 25.'},

{id:'dat-11',cat:'dat',
 q:'What is run-length encoding?',
 choices:['A lossless technique replacing consecutive repeated values with count+value (AAAAB → 4A1B)','Removing least-used characters from a file to reduce size (lossy)','Dividing a file into blocks and storing only differences between blocks','Converting data to binary before storing to reduce size'],
 exp:'Run-length encoding is effective when data has long runs of the same value (simple images, text). Inefficient for random data. It is lossless — original is perfectly recoverable.'},

{id:'dat-12',cat:'dat',
 q:'What is the difference between analog and digital data?',
 choices:['Analog = continuous values; digital = discrete binary values; conversion loses some precision','Analog is stored as floating-point; digital as integers in computers','Digital is more accurate because it uses more decimal places','They are interchangeable terms for non-compressed data'],
 exp:'Sound waves are analog. Digitizing samples the wave at intervals and stores each as binary — higher sampling rate and bit depth = better quality but larger file.'},

{id:'dat-13',cat:'dat',
 q:'Why is binary search faster than linear search, and when can you use it?',
 choices:['Binary search is O(log n) but requires a sorted list; linear search is O(n), works on any list','Binary search works on any list; linear requires sorting','Both have the same speed on sorted lists','Linear is faster because it only needs one pass'],
 exp:'Binary search eliminates half the remaining elements each step. Requires sorted data. Linear search checks each element one by one — slower but works on unsorted data.'},

{id:'dat-14',cat:'dat',
 q:'What is audio sampling?',
 choices:['Measuring sound wave amplitude at regular intervals and storing as binary numbers','Converting audio frequencies to visual waveforms for storage','Removing inaudible frequencies to reduce file size (lossy)','Splitting audio into equal chunks for parallel processing'],
 exp:'Higher sampling rate (more measurements/second) and more bits/sample = better quality, larger file. CD quality: 44,100 samples/sec, 16 bits/sample.'},

{id:'dat-15',cat:'dat',
 q:'What characterizes "big data"?',
 choices:['Volume (massive size), Velocity (high-speed generation), Variety (many formats) — too large for traditional tools','Any dataset larger than 1 GB stored on a cloud server','Data generated exclusively by IoT devices in real time','A statistical term for datasets with more than 1 million rows'],
 exp:'Big data requires distributed computing (many machines working together). Examples: social media streams, genomic databases, sensor networks.'},

{id:'dat-16',cat:'dat',
 q:'How many bits are needed to represent 1,000 unique values?',
 choices:['10 bits — because 2^10 = 1,024 ≥ 1,000 (2^9 = 512 is not enough)','9 bits — because 9 × 100 ≈ 1,000','8 bits — one byte is the standard unit','1,000 bits — one bit per value'],
 exp:'Always round up: ⌈log₂(N)⌉ bits needed. 2^9=512 < 1000, so 9 bits is insufficient. 2^10=1024 ≥ 1000, so 10 bits works.'},

// ══ CSN: COMPUTING SYSTEMS & NETWORKS ══
{id:'csn-01',cat:'csn',
 q:'What is a packet in internet communication?',
 choices:['A small chunk of data transmitted independently, routed separately, and reassembled at destination','A complete file sent as a single unit across a network','A browser request asking a web server for a page','A bundle of cables connecting two routers'],
 exp:'Packets can take different routes and arrive out of order — TCP reassembles them. This design allows the internet to route around failed nodes.'},

{id:'csn-02',cat:'csn',
 q:'What are the distinct roles of IP and TCP?',
 choices:['IP handles addressing/routing; TCP ensures reliable delivery (confirms receipt, re-sends lost packets)','IP ensures reliable delivery; TCP handles addressing','Both handle addressing — they\'re redundant protocols','TCP splits data into packets; IP reassembles them at the destination'],
 exp:'IP gets packets to the right address. TCP ensures they all arrive and are in order. Together they form the foundational internet protocol suite.'},

{id:'csn-03',cat:'csn',
 q:'What does DNS do?',
 choices:['Translates domain names (google.com) into IP addresses computers use to communicate','Encrypts web traffic between browser and server','Routes packets along the fastest available path','Verifies website identity using a digital certificate'],
 exp:'Without DNS you\'d memorize IP addresses for every website. DNS is like the internet\'s phone book.'},

{id:'csn-04',cat:'csn',
 q:'What is the difference between HTTP and HTTPS?',
 choices:['HTTPS adds TLS/SSL encryption to HTTP, protecting data from eavesdropping','HTTPS is faster because it uses fewer packets','HTTP is more secure because it uses a different port','HTTPS requires a login; HTTP is publicly accessible'],
 exp:'HTTPS encrypts the connection using TLS. Without it, anyone on the same network can read your traffic. Required for any site handling passwords or payments.'},

{id:'csn-05',cat:'csn',
 q:'What is fault tolerance, and how does the internet achieve it?',
 choices:['Continuing to operate despite failures — achieved via redundant paths that route around failed nodes','Detecting and correcting errors in transmitted data before delivery','Limiting devices that can connect simultaneously to prevent overload','Automatically restarting servers when they crash'],
 exp:'The internet\'s packet-switched design with multiple redundant paths was a deliberate fault-tolerance choice from the ARPANET era. No single point of failure can bring down the whole network.'},

{id:'csn-06',cat:'csn',
 q:'What is the difference between bandwidth and latency?',
 choices:['Bandwidth = max data per second (capacity); latency = delay; high bandwidth ≠ low latency','Bandwidth measures delay; latency measures max throughput','They\'re the same — high bandwidth always means low latency','Latency only matters for wired; bandwidth only for wireless'],
 exp:'A video call needs high bandwidth (quality) AND low latency (real-time feel). A large file download needs bandwidth but can tolerate high latency.'},

{id:'csn-07',cat:'csn',
 q:'What is the difference between sequential and parallel computing?',
 choices:['Sequential: one operation at a time; parallel: multiple processors run tasks simultaneously','Sequential uses multiple cores; parallel uses only one','Parallel is always faster than sequential for any task','Sequential is obsolete — all modern computers are fully parallel'],
 exp:'Parallel computing speeds up tasks that can be split into independent sub-tasks. Tasks with dependencies (step B needs step A\'s result) must still run sequentially — this limits the speedup.'},

{id:'csn-08',cat:'csn',
 q:'What is an undecidable problem?',
 choices:['A problem for which no algorithm can always give a correct yes/no answer for every input','A problem too computationally expensive to solve in reasonable time','A problem requiring quantum computers to solve','A problem that hasn\'t been solved yet but theoretically could be'],
 exp:'The classic example: the Halting Problem. It\'s provably impossible to write a program that correctly determines for every program+input whether it will halt or run forever. Undecidable ≠ just hard.'},

{id:'csn-09',cat:'csn',
 q:'What is the difference between the internet and the World Wide Web?',
 choices:['Internet = the physical network infrastructure; WWW = web pages/hyperlinks running on top of it','They are synonyms — "internet" and "World Wide Web" mean the same thing','The WWW is the infrastructure; the internet is the browser software','The internet is a subset of the WWW'],
 exp:'Email, video calls, and file transfers also use the internet but are not the web. The web is just one application that runs on the internet.'},

{id:'csn-10',cat:'csn',
 q:'What does a router do?',
 choices:['Forwards packets between networks toward their destination based on IP addresses','Translates domain names to IP addresses for local devices','Encrypts all traffic between a local network and the internet','Stores copies of websites to speed up loading (caching)'],
 exp:'Routers read destination IP addresses, consult routing tables, and forward packets to the next best hop. Multiple routers cooperate to deliver packets across the internet.'},

{id:'csn-11',cat:'csn',
 q:'What is a firewall?',
 choices:['Monitors and filters network traffic based on security rules to block threats','A device that boosts Wi-Fi signal strength in large buildings','Software that encrypts all data sent over a network','A backup system that copies files when the primary server fails'],
 exp:'Firewalls can be hardware, software, or both. They block traffic matching known threat patterns or that violates defined rules (e.g., block all incoming connections on port X).'},

{id:'csn-12',cat:'csn',
 q:'What is cloud computing?',
 choices:['Using remote internet-hosted servers instead of local hardware for storage and processing','Storing data across many local devices in a distributed network','Running software offline that syncs to the internet only when connected','A network topology where all devices connect to a central hub'],
 exp:'Cloud computing enables individuals and small organizations to access computing power previously requiring expensive infrastructure. Examples: Google Drive, AWS, iCloud.'},

{id:'csn-13',cat:'csn',
 q:'What does a VPN do?',
 choices:['Encrypts all traffic between a device and a VPN server, hiding activity and masking IP address','Speeds up connections by caching frequently visited sites','Blocks all incoming connections from foreign IP addresses','Translates IP addresses across different network types'],
 exp:'VPNs are useful on public Wi-Fi (encrypts traffic from local eavesdroppers) and for masking IP from websites. The VPN server itself can see your traffic, so provider trust matters.'},

{id:'csn-14',cat:'csn',
 q:'What is the key difference between a DoS and a DDoS attack?',
 choices:['DoS = one machine floods a target; DDoS = many machines (botnet) flood simultaneously','DDoS is less severe because traffic is spread across more machines','DoS and DDoS are identical — "distributed" refers to where data is stored','DDoS targets software; DoS targets hardware'],
 exp:'DDoS is harder to defend against because traffic comes from thousands of different IPs — blocking one source doesn\'t stop the attack.'},

{id:'csn-15',cat:'csn',
 q:'What is redundancy in computing systems?',
 choices:['Duplicate components (extra paths, servers, drives) so failures don\'t stop the system','Removing unused code from software to improve performance','Compressing data to reduce storage across multiple servers','Automatically checking data for errors after every transmission'],
 exp:'Redundancy enables fault tolerance. Examples: RAID drives (data on multiple disks), multiple data center locations, redundant network paths between cities.'},

{id:'csn-16',cat:'csn',
 q:'What does Moore\'s Law state?',
 choices:['Transistor count on a chip doubles roughly every 2 years, driving exponential growth in computing power','Internet bandwidth doubles every 18 months as fiber improves','Software complexity doubles every 2 years as languages evolve','Hardware cost doubles every 2 years due to manufacturing complexity'],
 exp:'Moore\'s Law held for decades, driving the computing revolution. Today it\'s slowing due to physical limits of silicon. GPUs, parallel processing, and new materials are compensating.'},

// ══ CRD: CREATIVE DEVELOPMENT ══
{id:'crd-01',cat:'crd',
 q:'What is abstraction in programming?',
 choices:['Hiding implementation complexity behind a simpler interface or name','Translating source code into machine code for execution','Adding comments to explain every line of code','Dividing a program into equal-sized functions for load balancing'],
 exp:'Example: calling SORT(list) sorts the list without knowing the internal algorithm. The complexity is hidden — you only need to know what it does, not how.'},

{id:'crd-02',cat:'crd',
 q:'What is the main benefit of procedural abstraction?',
 choices:['Code written once can be reused many times; complexity is hidden behind a simple name','Documentation is automatically generated from procedure signatures','Procedures can call themselves recursively','Procedures are compiled into binary before sharing as libraries'],
 exp:'Procedural abstraction manages complexity (each procedure does one thing) and enables reuse (call it anywhere without rewriting). It\'s foundational to all large programs.'},

{id:'crd-03',cat:'crd',
 q:'What is iterative development?',
 choices:['Building programs through repeated cycles of design, implement, test, and refine','Writing the full specification before writing any code','Multiple programmers working on separate features simultaneously','Running automated tests after every single line of code is written'],
 exp:'Most real programs are built iteratively. Each cycle produces a working version that is tested and improved. Waterfall (full spec first) is the alternative.'},

{id:'crd-04',cat:'crd',
 q:'What is the difference between a syntax error and a logic error?',
 choices:['Syntax = code cannot run (language rule violated); logic = code runs but produces wrong output','Syntax errors are caught at runtime; logic errors at compile time','Logic errors prevent the program from running; syntax errors produce wrong output','Both crash the program — the difference is when the crash occurs'],
 exp:'A third type exists: runtime error — code looks valid but crashes during execution (e.g., dividing by zero, accessing list index out of bounds).'},

{id:'crd-05',cat:'crd',
 q:'What does it mean for a program to be "correct"?',
 choices:['It produces expected output for ALL valid inputs — not just test cases the programmer tried','It compiles without errors and runs without crashing on any input','It passes all test cases the programmer has explicitly tried','It has been reviewed by at least one other programmer'],
 exp:'Testing can demonstrate the presence of bugs but cannot prove their complete absence. Thorough testing including edge cases (boundary values, empty input) is essential.'},

{id:'crd-06',cat:'crd',
 q:'What is an API?',
 choices:['A set of specifications allowing one program to use another\'s functionality without knowing its internals','A visual drag-and-drop interface for building applications','A security protocol verifying web application identity','A standard file format for sharing data between apps (like JSON)'],
 exp:'APIs enable composition — programs built from existing services (maps, payments, weather) without reinventing them. Reduces development time and errors.'},

{id:'crd-07',cat:'crd',
 q:'What is a computing artifact?',
 choices:['Anything created by a human using a computer — programs, images, audio, video, data visualizations','Only software programs written in a recognized language','Only physical devices like computers and tablets','Only items published or distributed to other users'],
 exp:'CB\'s definition is intentionally broad. The AP CSP Create Performance Task asks students to create a computing artifact, which is typically a program.'},

{id:'crd-08',cat:'crd',
 q:'What is a software library, and how does it relate to abstraction?',
 choices:['Pre-written reusable functions callable without knowing their implementation — a form of abstraction','A database of all programs ever written, searchable by function name','A collection of hardware drivers for device communication','A versioned archive of previous program releases for rollback'],
 exp:'Libraries implement abstraction: you call sqrt() or drawCircle() without knowing or caring how they work internally. This reduces complexity and development time.'},

{id:'crd-09',cat:'crd',
 q:'What does CB identify as a key benefit of collaboration in program development?',
 choices:['Multiple perspectives catch more bugs; different skills complement; large programs require teams','Collaboration mainly slows development due to required code reviews','The main benefit is that all collaborators can claim credit for the full program','Collaboration only benefits programs longer than 10,000 lines of code'],
 exp:'CB emphasizes that computing is collaborative. Large programs are too complex for one person. Different backgrounds (design, logic, testing) produce better results together.'},

{id:'crd-10',cat:'crd',
 q:'What is the purpose of program documentation?',
 choices:['Explains what code does and why, helping others (and future self) understand and modify it','Required only for programs published to an app store','Serves as the legal record of who wrote which part','Automatically generated by the compiler from function names'],
 exp:'Good documentation explains the "why" behind decisions, not just the "what." Inline comments, README files, and API docs are all forms of documentation.'},

{id:'crd-11',cat:'crd',
 q:'What is modularity in program design?',
 choices:['Breaking a program into independent components each handling one task — easier to test and modify','Splitting a program across multiple computers to run faster','Using a single large function for all logic to avoid overhead','Requiring all functions to have the same number of parameters'],

{id:'crd-12',cat:'crd',
 q:'What is the difference between a general-purpose and special-purpose computing device?',
 choices:['General-purpose runs many programs (laptop, phone); special-purpose is optimized for one task (GPS, ASIC chip)','General-purpose devices are always slower than special-purpose for every task','Special-purpose devices can run any program but excel at one','The distinction only applies to hardware, not software'],
 exp:'Special-purpose devices (Bitcoin mining ASICs, graphics cards) vastly outperform general-purpose hardware at their specific task, but can\'t do other things.'}

];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const LS = 'apcs_fc2_';
let currentCat = 'all';
let deck = [];
let deckIdx = 0;
let answered = false;
let selectedIdx = -1;
let correctIdx = -1;
let shuffledChoices = [];

const CAT_LABELS = {
  'all':'All','aap-syn':'AAP: Syntax','aap-trace':'AAP: Tracing',
  'ioc':'IOC','dat':'DAT','csn':'CSN','crd':'CRD'
};

function getMastered(id) { return localStorage.getItem(LS+'m_'+id)==='1'; }
function setMastered(id,v) { localStorage.setItem(LS+'m_'+id, v?'1':'0'); }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateCatCounts();
  updateOverall();
  selectCat('all');
});

function updateOverall() {
  const done = CARDS.filter(c => getMastered(c.id)).length;
  const pct = Math.round(done / CARDS.length * 100);
  document.getElementById('overall-fill').style.width = pct+'%';
  document.getElementById('overall-label').textContent = done+' / '+CARDS.length+' mastered';
}

function updateCatCounts() {
  ['all','aap-syn','aap-trace','ioc','dat','csn','crd'].forEach(cat => {
    const cards = cat==='all' ? CARDS : CARDS.filter(c=>c.cat===cat);
    const rem = cards.filter(c=>!getMastered(c.id)).length;
    const el = document.getElementById('cnt-'+cat);
    if (el) el.textContent = rem > 0 ? '('+rem+')' : '✓';
  });
}

// ─────────────────────────────────────────────
// CATEGORY + DECK
// ─────────────────────────────────────────────
function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  buildDeck();
}

function buildDeck() {
  const source = currentCat==='all' ? CARDS : CARDS.filter(c=>c.cat===currentCat);
  const unmastered = source.filter(c=>!getMastered(c.id));
  const mastered   = source.filter(c=> getMastered(c.id));
  deck = [...unmastered, ...mastered];
  deckIdx = 0;
  renderCard();
}

function shuffleDeck() {
  const source = currentCat==='all' ? CARDS : CARDS.filter(c=>c.cat===currentCat);
  deck = [...source].sort(()=>Math.random()-0.5);
  deckIdx = 0;
  renderCard();
}

function resetCategory() {
  const source = currentCat==='all' ? CARDS : CARDS.filter(c=>c.cat===currentCat);
  source.forEach(c=>setMastered(c.id,false));
  updateCatCounts();
  updateOverall();
  buildDeck();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderCard() {
  const main = document.getElementById('main-content');

  if (deck.length === 0) {
    main.innerHTML = `<div class="state-screen"><div class="state-card">
      <div class="state-icon">📚</div>
      <h2>No cards here</h2>
      <p>This category has no cards.</p>
      <button class="state-btn" onclick="selectCat('all')">Show all cards</button>
    </div></div>`;
    return;
  }

  if (deckIdx >= deck.length) {
    const total = deck.length;
    const mastered = deck.filter(c=>getMastered(c.id)).length;
    main.innerHTML = `<div class="state-screen"><div class="state-card">
      <div class="state-icon">🎉</div>
      <h2>Deck complete!</h2>
      <p>${mastered} of ${total} cards mastered this session.</p>
      <button class="state-btn" onclick="resetCategory()">↺ Restart deck</button>
      <button class="state-btn secondary" onclick="shuffleDeck()">⇄ Shuffle &amp; restart</button>
    </div></div>`;
    return;
  }

  const card = deck[deckIdx];
  answered = false;
  selectedIdx = -1;

  // Shuffle choices, track correct index
  const indices = [0,1,2,3].sort(()=>Math.random()-0.5);
  shuffledChoices = indices.map(i=>card.choices[i]);
  correctIdx = shuffledChoices.indexOf(card.choices[0]);

  const pct = Math.round(deckIdx / deck.length * 100);
  const letters = ['A','B','C','D'];
  const catClass = card.cat.replace('-','');

  const choiceBtns = shuffledChoices.map((ch,i) =>
    `<button class="choice-btn" id="choice-${i}" onclick="selectChoice(${i})">
      <span class="choice-letter">${letters[i]}</span>
      <span>${ch}</span>
    </button>`
  ).join('');

  const qHtml = card.code
    ? `<pre class="question-code">${card.q}</pre>`
    : `<div class="question-text">${card.q}</div>`;

  main.innerHTML = `
    <div class="question-area" id="question-area">
      <div class="deck-progress">
        <div class="deck-bar-wrap"><div class="deck-bar-fill" style="width:${pct}%"></div></div>
        <span class="deck-label">${deckIdx+1} / ${deck.length}</span>
      </div>
      <span class="cat-label ${card.cat}">${CAT_LABELS[card.cat]||card.cat}</span>
      ${qHtml}
      <div id="explanation-area"></div>
    </div>
    <div class="choice-area" id="choice-area">
      ${choiceBtns}
      <div id="next-row"></div>
    </div>
  `;
}

function selectChoice(idx) {
  if (answered) return;
  answered = true;
  selectedIdx = idx;
  const card = deck[deckIdx];

  // Style buttons
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('choice-'+i);
    if (!btn) continue;
    btn.classList.add('disabled');
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === idx && idx !== correctIdx) btn.classList.add('wrong');
  }

  // Show explanation
  const expArea = document.getElementById('explanation-area');
  if (expArea && card.exp) {
    expArea.innerHTML = `<div class="explanation-box">
      <div class="exp-label">${idx===correctIdx ? '✓ Correct' : '✗ Incorrect'}</div>
      ${card.exp}
    </div>`;
    // Scroll explanation into view
    setTimeout(()=>expArea.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  }

  // Show next-row buttons
  const isCorrect = (idx === correctIdx);
  document.getElementById('next-row').innerHTML = isCorrect
    ? `<button class="btn-next btn-mastered" onclick="advance(true)">✓ Got it — Next</button>`
    : `<div class="next-row">
        <button class="btn-next btn-review" style="flex:1" onclick="advance(false)">↺ Review again</button>
        <button class="btn-next btn-mastered" style="flex:1" onclick="advance(true)">→ Next anyway</button>
       </div>`;
}

function advance(markMastered) {
  const card = deck[deckIdx];
  setMastered(card.id, markMastered);
  if (!markMastered) {
    // Move to end of deck
    deck.splice(deckIdx, 1);
    deck.push(card);
  } else {
    deckIdx++;
  }
  updateCatCounts();
  updateOverall();
  renderCard();
}
</script>
</body>
</html>
