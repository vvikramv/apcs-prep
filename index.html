<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ajay's AP CSP Prep</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #134e4a 0%, #0d9488 55%, #4f46e5 100%);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px 40px;
}

.header { text-align: center; margin-bottom: 36px; }
.header h1 { font-size: 26px; font-weight: 800; color: white; letter-spacing: -0.3px; }
.header p  { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 6px; }
.exam-badge {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  margin-top: 12px;
  letter-spacing: 0.02em;
}

.cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 380px; }

.nav-card {
  background: white;
  border-radius: 18px;
  padding: 24px 22px;
  display: flex;
  align-items: center;
  gap: 18px;
  text-decoration: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
}
.nav-card:active { transform: scale(0.97); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }

.nav-icon {
  width: 54px;
  height: 54px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.icon-plan      { background: #f0fdfa; }
.icon-cards     { background: #eef2ff; }

.nav-text { flex: 1; }
.nav-title { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 3px; }
.nav-sub   { font-size: 13px; color: #6b7280; line-height: 1.4; }

.nav-arrow { font-size: 20px; color: #d1d5db; flex-shrink: 0; }

.footer { margin-top: 32px; font-size: 12px; color: rgba(255,255,255,0.45); text-align: center; }
</style>
</head>
<body>

<div class="header">
  <h1>AP CSP Prep</h1>
  <p>Ajay Lohitsa</p>
  <div class="exam-badge">Exam: May 14, 2026</div>
</div>

<div class="cards">

  <a class="nav-card" href="apcs_prep_plan.html">
    <div class="nav-icon icon-plan">&#128197;</div>
    <div class="nav-text">
      <div class="nav-title">Study Plan</div>
      <div class="nav-sub">24-day schedule · daily tasks · progress tracking</div>
    </div>
    <div class="nav-arrow">&#8250;</div>
  </a>

  <a class="nav-card" href="apcs_flashcards.html">
    <div class="nav-icon icon-cards">&#9889;</div>
    <div class="nav-text">
      <div class="nav-title">Flashcards</div>
      <div class="nav-sub">57 cards · pseudocode · IOC · DAT · CSN · CRD</div>
    </div>
    <div class="nav-arrow">&#8250;</div>
  </a>

</div>

<div class="footer">All progress saves to this browser &nbsp;·&nbsp; Works offline once loaded</div>

</body>
</html>
